

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>LittleFrog</title>
    <link rel="stylesheet" href="bejelentkezes.css">

</head>
<body>

    <div id="adatoldal">
        <a id="h1" href="login.html">Login</a>
        <a href="register.html" id="reg">Register</a>
            
    
        <div id="kerdoiv">
            
                <form onsubmit="register(event)">
                    <p id="cim">Register</p>
                <div class="sor">
                    <label for="username" id="Username">Username:</label>
                    <input type="text" id="username" name="username" minlength="6" maxlength="15" required>
                </div>
                
                <div class="sor">
                    <label for="password" id="Password">Password:</label>
                    <input type="password" id="password" name="password" minlength="6" maxlength="15" required>
                </div>
                
                
                
                <div class="sor">
                    <label for="email" id="Email">Email:</label>
                    <input type="email" id="email" name="email"  required>
                </div>

                <button type="submit" id="loginBTn">Register</button>
                </form>
                
        </div>

       

    </div>
    
    
      
    
    
    
    
    
    
    
    
    
  
    







    

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvgNMW9JRoB4DDazv4J-fKL1z7GH7l1Vg",
  authDomain: "littlefrog-87931.firebaseapp.com",
  projectId: "littlefrog-87931",
  storageBucket: "littlefrog-87931.firebasestorage.app",
  messagingSenderId: "1087927436713",
  appId: "1:1087927436713:web:06f2df9b13a8ffd394f0b8",
  measurementId: "G-0GLKJ9P2Q5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(event) {
  event.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Sikeres regisztráció!");
      window.location.href = "login.html";
    })
    .catch((error) => {
      alert(error.message);
    });
}
</script>
</body>
</html>
